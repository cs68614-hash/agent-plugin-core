name: quality

on:
  push:
  pull_request:

jobs:
  plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/agent-plugin-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/agent-plugin-core/package-lock.json
      - run: npm ci
      - run: npm run quality
